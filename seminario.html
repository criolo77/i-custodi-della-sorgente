<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seminario - Custodi della Sorgente</title>
  <meta name="description" content="Seminari di Custodi della Sorgente: incontri ed esperienze di crescita personale e ricerca interiore.">
  <link rel="stylesheet" href="style.css">
  <style>
    .seminario-template {
      background: var(--white);
      padding-top: 8rem;
    }

    .seminario-detail {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.4fr);
      gap: clamp(2rem, 5vw, 4.5rem);
      align-items: start;
    }

    .seminario-detail-cover {
      border-radius: 8px;
      overflow: hidden;
      background: var(--cream);
      min-height: 360px;
      display: grid;
      place-items: center;
    }

    .seminario-detail-cover img {
      width: 100%;
      height: 100%;
      min-height: 360px;
      object-fit: cover;
      display: block;
    }

    .seminario-detail-body {
      max-width: 760px;
    }

    .seminario-detail-title {
      margin: 0.6rem 0 0.4rem;
    }

    .seminario-detail-subtitle {
      color: var(--ink-soft);
      font-size: 1.08rem;
      margin: 0 0 1rem;
    }

    .seminario-detail-meta {
      color: var(--gold-dark);
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .seminario-detail-text {
      color: var(--ink-soft);
      font-size: 1.08rem;
      line-height: 1.8;
      margin-top: 1.5rem;
      white-space: pre-line;
    }

    .seminario-detail-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .seminario-link-note {
      color: var(--ink-soft);
      font-size: 0.95rem;
      margin: 0;
      width: 100%;
    }

    .btn.is-disabled {
      opacity: .5;
      cursor: not-allowed;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      .seminario-detail {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header scrolled">
    <div class="container nav">
      <a href="index.html#top" class="brand">
        <span class="brand-mark brand-mark-logo">
          <img src="images/logo-sorgente.png" alt="Logo Custodi della Sorgente" class="brand-logo-img">
        </span>
        Custodi <em>della Sorgente</em>
      </a>
      <nav class="nav-desktop" aria-label="Navigazione principale">
        <a href="index.html#eventi">Seminari</a>
        <a href="index.html#frammenti">Frammenti</a>
        <a href="index.html#quaderni">Quaderni</a>
        <a href="index.html#testimonianze">Le Voci</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="section seminario-template">
      <div class="container">
        <article class="seminario-detail" id="seminarioDetail" aria-live="polite">
          <div class="seminario-detail-cover">
            <div class="seminario-cover-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M11.645 20.91a.75.75 0 0 0 .71 0c.083-.043 3.223-1.694 6.364-4.474C20.478 14.492 22.5 11.9 22.5 9.15 22.5 5.9 19.914 3.5 16.9 3.5c-1.86 0-3.436.99-4.4 2.516C11.536 4.49 9.96 3.5 8.1 3.5 5.086 3.5 2.5 5.9 2.5 9.15c0 2.75 2.022 5.342 3.781 7.286 3.14 2.78 6.281 4.431 6.364 4.474z"/>
              </svg>
            </div>
          </div>
          <div class="seminario-detail-body">
            <span class="eyebrow">Seminari della Sorgente</span>
            <h1 class="seminario-detail-title">Caricamento...</h1>
            <p class="seminario-detail-text">Stiamo aprendo il seminario richiesto.</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <span>Realizzato con cura, respiro dopo respiro.</span>
        <span>© <span id="year"></span> Custodi della Sorgente.</span>
      </div>
    </div>
  </footer>

  <script src="content-engine.js"></script>
  <script>
    (function () {
      "use strict";

      var yearEl = document.getElementById("year");
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      var escapeHtml = ContentEngine.escapeHtml;
      var formatDateRange = ContentEngine.formatDateRange;

      function renderSeminario(item, root) {
        var title = item.titolo || "Seminario della Sorgente";
        var cover = item.immagine
          ? '<img src="' + escapeHtml(item.immagine) + '" alt="' + escapeHtml(title) + '">'
          : '<div class="seminario-cover-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M11.645 20.91a.75.75 0 0 0 .71 0c.083-.043 3.223-1.694 6.364-4.474C20.478 14.492 22.5 11.9 22.5 9.15 22.5 5.9 19.914 3.5 16.9 3.5c-1.86 0-3.436.99-4.4 2.516C11.536 4.49 9.96 3.5 8.1 3.5 5.086 3.5 2.5 5.9 2.5 9.15c0 2.75 2.022 5.342 3.781 7.286 3.14 2.78 6.281 4.431 6.364 4.474z"/></svg></div>';

        var dateRange = formatDateRange(item.startDate, item.endDate);
        var metaParts = [dateRange, item.luogo, item.orario].filter(Boolean);
        var text = item.descrizione || "Maggiori informazioni su questo seminario saranno disponibili a breve.";
        var subtitle = item.sottotitolo
          ? '<p class="seminario-detail-subtitle">' + escapeHtml(item.sottotitolo) + '</p>'
          : "";

        var statoSeminario = (item.stato || "").toString().trim().toLowerCase();
        var action;
        if (statoSeminario === "prossimamente") {
          action = '<button class="btn btn-gold is-disabled" type="button" disabled aria-disabled="true">A breve le iscrizioni</button>';
        } else if (statoSeminario === "concluso") {
          action = '<button class="btn btn-gold is-disabled" type="button" disabled aria-disabled="true">Seminario concluso</button>';
        } else {
          // Riusa esattamente lo stesso popup di iscrizione gia' presente in Home
          // (stessa funzione openModal() in script.js): nessun sistema separato.
          // btn-gold: stile primario gia' esistente nel sito, per rendere
          // "Iscriviti" l'azione principale della pagina.
          action = '<a class="btn btn-gold" href="index.html?iscriviti=1#eventi">Iscriviti</a>';
        }

        document.title = title + " - Custodi della Sorgente";
        root.innerHTML = '<div class="seminario-detail-cover">' + cover + '</div>'
          + '<div class="seminario-detail-body">'
          + '<span class="eyebrow">Seminari della Sorgente</span>'
          + (metaParts.length ? '<div class="seminario-detail-meta">' + escapeHtml(metaParts.join(" · ")) + '</div>' : "")
          + '<h1 class="seminario-detail-title">' + escapeHtml(title) + '</h1>'
          + subtitle
          + '<p class="seminario-detail-text">' + escapeHtml(text) + '</p>'
          + '<div class="seminario-detail-actions">'
          + action
          + '<a class="btn btn-outline-dark" href="index.html#eventi">Torna ai Seminari</a>'
          + '</div>'
          + '</div>';
      }

      function renderNotFound(root) {
        root.innerHTML = '<div class="seminario-detail-body">'
          + '<span class="eyebrow">Seminari della Sorgente</span>'
          + '<h1 class="seminario-detail-title">Seminario non trovato</h1>'
          + '<p class="seminario-detail-text">Il seminario richiesto non e presente nei contenuti pubblicati.</p>'
          + '<div class="seminario-detail-actions"><a class="btn btn-outline-dark" href="index.html#eventi">Torna ai Seminari</a></div>'
          + '</div>';
      }

      ContentEngine.initDetailPage({
        dataUrl: "content/seminari.json",
        rootId: "seminarioDetail",
        isVisible: function (item) { return (item.stato || "").toString().trim().toLowerCase() !== "bozza"; },
        render: renderSeminario,
        renderNotFound: renderNotFound
      });
    })();
  </script>
</body>
</html>

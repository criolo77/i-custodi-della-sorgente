<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720">
  <rect width="600" height="720" fill="#641C29"/>
  <rect width="600" height="720" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#9A3B34" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#3D0F18" stop-opacity=".0"/>
    </radialGradient>
  </defs>
  <!-- concentric circles motif -->
  <circle cx="300" cy="300" r="50"  fill="none" stroke="#C9A24B" stroke-width="1.2" opacity=".35"/>
  <circle cx="300" cy="300" r="100" fill="none" stroke="#C9A24B" stroke-width="1"   opacity=".25"/>
  <circle cx="300" cy="300" r="150" fill="none" stroke="#C9A24B" stroke-width=".8"  opacity=".18"/>
  <!-- person silhouette -->
  <circle cx="300" cy="255" r="62" fill="#C9A24B" opacity=".22"/>
  <path d="M172 480 C172 390 428 390 428 480" fill="#C9A24B" opacity=".18"/>
  <!-- label -->
  <text x="300" y="590" font-family="Georgia,serif" font-size="22"
        fill="#E7D6A6" text-anchor="middle" opacity=".7">
    Foto in arrivo
  </text>

media:
  input: images
  output: /images

content:
  - name: testimonianze
    label: Testimonianze
    type: file
    path: content/testimonianze.json
    format: json
    list: true
    fields:
      - name: nome
        label: Nome
        type: string
        required: true
      - name: testo
        label: Testimonianza
        type: text
        required: true
      - name: foto
        label: Foto
        type: image
        required: false

  - name: seminari
    label: Seminari
    type: file
    path: content/seminari.json
    format: json
    list: true
    fields:
      - name: titolo
        label: Titolo
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: false
        description: "Identificativo usato nell'indirizzo della pagina del seminario (es. seminario.html?slug=nome-seminario). Puoi lasciarlo vuoto: viene generato automaticamente dal Titolo. Compilalo solo se vuoi un indirizzo diverso da quello proposto automaticamente (solo lettere minuscole, numeri e trattini, senza spazi né accenti)."
      - name: sottotitolo
        label: Sottotitolo
        type: string
      - name: startDate
        label: Data inizio
        type: date
        required: true
      - name: endDate
        label: Data fine
        type: date
        required: false
      - name: orario
        label: Orario
        type: string
      - name: luogo
        label: Luogo
        type: string
      - name: descrizione
        label: Descrizione
        type: text
      - name: immagine
        label: Immagine
        type: image
      - name: link
        label: Link
        type: string
      - name: stato
        label: Stato
        type: select
        options:
          values:
            - value: aperto
              label: Aperto
            - value: prossimamente
              label: Prossimamente
            - value: concluso
              label: Concluso
            - value: bozza
              label: Bozza

  - name: frammenti
    label: Frammenti
    type: file
    path: content/frammenti.json
    format: json
    list: true
    fields:
      - name: titolo
        label: Titolo
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: false
        description: "Identificativo usato nell'indirizzo della pagina del frammento (es. frammento.html?slug=nome-frammento). Puoi lasciarlo vuoto: viene generato automaticamente dal Titolo."
      - name: data
        label: Data
        type: date
      - name: luogo
        label: Luogo
        type: string
      - name: testo
        label: Descrizione dell'evento
        type: text
        required: true
      - name: galleria
        label: Galleria immagini
        type: image
        list: true

  - name: quaderni
    label: Quaderni
    type: file
    path: content/quaderni.json
    format: json
    list: true
    fields:
      - name: titolo
        label: Titolo
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: false
        description: "Identificativo usato nell'indirizzo della pagina del quaderno (es. quaderno.html?slug=nome-quaderno). Puoi lasciarlo vuoto: viene generato automaticamente dal Titolo. Compilalo solo se vuoi un indirizzo diverso da quello proposto automaticamente (solo lettere minuscole, numeri e trattini, senza spazi né accenti)."
      - name: autore
        label: Autore
        type: string
      - name: estratto
        label: Estratto
        type: text
      - name: descrizione
        label: Descrizione
        type: text
      - name: contenuto
        label: Contenuto
        type: text
      - name: copertina
        label: Copertina
        type: image
      - name: pdf
        label: PDF
        type: string
      - name: data
        label: Data
        type: date
      - name: stato
        label: Stato
        type: select
        options:
          values:
            - value: bozza
              label: Bozza
            - value: pubblicato
              label: Pubblicato
      - name: seoTitle
        label: SEO Title
        type: string
      - name: metaDescription
        label: Meta Description
        type: text

